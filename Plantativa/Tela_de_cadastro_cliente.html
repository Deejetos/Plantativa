<link rel="stylesheet" href="tela_de_cadastro.css">

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro para cliente</title>
    <link rel="stylesheet" href="scr/style/cadastro.css">
</head>
<body>
    <form action="">
        <div>
            <h1> Cadastro para Cliente </h1>
            <div class="barra-horizontal"></div>
        </div>
        <div class="barra-horizontal"></div>
        <div class="campo-input">
            <label for="nome">Digite seu nome de usuário</label>
            <input type="nome" id="nome" />
        </div>
        <div class="campo-input">
            <label for="email">Seu e-mail*</label>
            <input type="email" id="email" />
        </div>
        <div class="campo-input">
            <label for="CPF">Digite seu CPF</label>
            <input type="password" id="password" />
        </div>
        <div class="campo-input">
            <label for="telefone">Insira seu número de telefone</label>
            <input type="telefone" id="telefone" />
        </div>
        <button class="btn-default">
            <a href="PlantaAtiva.html">Cadastrar</a>
        </button>
            
    </form>
</body>
</html>
